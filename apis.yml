aid: chs
name: CHS Inc.
x-type: company
description: >-
  CHS Inc. is a Fortune 500 diversified, integrated, global agricultural
  cooperative owned by farmers, ranchers, cooperatives, and individual
  producers. Headquartered in Inver Grove Heights, Minnesota, CHS describes
  itself as the largest farmer-owned cooperative in the United States, with
  more than 750 member cooperatives, 75,000+ individual producer-owners, and
  20,000+ preferred stockholders. The cooperative serves customers in 65
  countries through three primary business divisions: Agriculture (crop
  nutrients, crop protection, precision agriculture, seed, animal nutrition,
  and oilseed products), Energy (refined fuels, propane, lubricants,
  pipelines, terminals, and renewable fuels under the Cenex brand), and
  Services (hedging, payment solutions, transportation, and capital
  services). Major brands include Cenex, Allegiant (seed), Payback
  (animal nutrition), and N-Edge (crop nutrients). CHS does not currently
  publish a public consumer-facing developer API; partner integrations are
  provided through digital platforms such as MyCHS (online portal for
  grain tickets, billing, and payments) and CHS Connect (digital
  self-service for crop protection and energy wholesale customers).
